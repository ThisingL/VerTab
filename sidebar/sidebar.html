<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VerTab Sidebar</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="sidebar">
    <!-- 搜索栏 -->
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16">
        <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" id="search-input" placeholder="搜索标签页..." autocomplete="off">
    </div>

    <!-- 固定标签页区域 -->
    <div class="section pinned-section" id="pinned-section" style="display:none;">
      <div class="section-header">
        <span class="section-title">固定的标签页</span>
      </div>
      <div class="tab-list" id="pinned-tabs"></div>
    </div>

    <!-- 标签页分组和列表 -->
    <div class="tabs-container" id="tabs-container">
      <div class="tab-list" id="all-tabs"></div>
    </div>

    <!-- 最近关闭的标签页 -->
    <div class="section recently-closed-section" id="recently-closed-section" style="display:none;">
      <div class="section-header" id="toggle-recently-closed">
        <span class="section-title">最近关闭</span>
        <svg class="chevron" viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
        </svg>
      </div>
      <div class="tab-list" id="recently-closed-tabs" style="display:none;"></div>
    </div>

    <!-- 底部操作栏 -->
    <div class="bottom-bar">
      <button class="btn-new-tab" id="btn-new-tab" title="新建标签页">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
        <span>新建标签页</span>
      </button>
      <div class="bottom-actions">
        <button class="btn-icon" id="btn-theme" title="切换主题">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
          </svg>
        </button>
        <button class="btn-icon" id="btn-settings" title="设置">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="context-menu" style="display:none;">
      <div class="context-menu-item" data-action="pin">固定标签页</div>
      <div class="context-menu-item" data-action="unpin">取消固定</div>
      <div class="context-menu-item" data-action="duplicate">复制标签页</div>
      <div class="context-menu-item" data-action="reload">刷新</div>
      <div class="context-menu-item" data-action="mute">静音</div>
      <div class="context-menu-item" data-action="unmute">取消静音</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="add-to-group">添加到分组...</div>
      <div class="context-menu-item" data-action="remove-from-group">从分组移除</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" data-action="copy-url">复制链接</div>
      <div class="context-menu-item" data-action="close">关闭标签页</div>
    </div>

    <!-- 分组创建对话框 -->
    <div class="dialog-overlay" id="group-dialog" style="display:none;">
      <div class="dialog">
        <div class="dialog-title">创建分组</div>
        <input type="text" id="group-name-input" placeholder="分组名称" autocomplete="off">
        <div class="color-picker" id="color-picker">
          <div class="color-dot" data-color="blue" style="background:#8ab4f8;"></div>
          <div class="color-dot" data-color="red" style="background:#f28b82;"></div>
          <div class="color-dot" data-color="yellow" style="background:#fdd663;"></div>
          <div class="color-dot" data-color="green" style="background:#81c995;"></div>
          <div class="color-dot" data-color="pink" style="background:#ff8bcb;"></div>
          <div class="color-dot" data-color="purple" style="background:#c58af9;"></div>
          <div class="color-dot" data-color="cyan" style="background:#78d9ec;"></div>
          <div class="color-dot" data-color="orange" style="background:#fcad70;"></div>
        </div>
        <div class="dialog-actions">
          <button class="btn-cancel" id="group-cancel">取消</button>
          <button class="btn-confirm" id="group-confirm">创建</button>
        </div>
      </div>
    </div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settings-panel" style="display:none;">
      <div class="settings-header">
        <span>设置</span>
        <button class="btn-icon btn-close-settings" id="btn-close-settings">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div class="settings-content">
        <div class="setting-item">
          <label>侧边栏位置</label>
          <select id="setting-position">
            <option value="left">左侧</option>
            <option value="right">右侧</option>
          </select>
        </div>
        <div class="setting-item">
          <label>主题</label>
          <select id="setting-theme">
            <option value="dark">暗色</option>
            <option value="light">亮色</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
